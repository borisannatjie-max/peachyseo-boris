<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeachySEO - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFB347 0%, #FFCC80 30%, #FFD54F 60%, #FF8A65 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 60px 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo img {
            max-width: 280px;
            height: auto;
        }

        .tagline {
            font-size: 18px;
            color: #6D4C41;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .coming-soon-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .notify-section {
            margin-bottom: 40px;
        }

        .notify-text {
            color: #5D4037;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .email-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .email-input {
            flex: 1;
            min-width: 200px;
            padding: 15px 20px;
            border: 2px solid #FFCC80;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .email-input:focus {
            border-color: #FF6B35;
        }

        .submit-btn {
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 600;
        }

        .error-message {
            display: none;
            background: #e74c3c;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 14px;
            margin-top: 10px;
        }

        .contact-section {
            border-top: 1px solid #FFCC80;
            padding-top: 30px;
        }

        .contact-label {
            color: #8D6E63;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .email-link {
            color: #FF6B35;
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
        }

        .email-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
            }
            .brand-name {
                font-size: 32px;
            }
            .tagline {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="peachseo-logo.png" alt="PeachySEO Logo" style="max-width: 400px; height: auto;">
        </div>
        <p class="tagline">SEO so sweet, your competitors will be peeved.</p>
        
        <div class="coming-soon-badge">Coming Soon</div>
        
        <div class="notify-section">
            <p class="notify-text">Be the first to know when we launch. Drop your email below!</p>
            <form class="email-form" id="notifyForm">
                <input type="email" class="email-input" name="email" placeholder="your@email.com" required>
                <button type="submit" class="submit-btn" id="submitBtn">Notify Me</button>
            </form>
            <div class="success-message" id="successMsg">🎉 You're on the list!</div>
            <div class="error-message" id="errorMsg"></div>
        </div>
        
        <div class="contact-section">
            <p class="contact-label">Or reach out directly:</p>
            <a href="mailto:hello@peachyseo.com" class="email-link">hello@peachyseo.com</a>
        </div>
    </div>

    <script>
        document.getElementById('notifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var btn = document.getElementById('submitBtn');
            var successMsg = document.getElementById('successMsg');
            var errorMsg = document.getElementById('errorMsg');
            var email = this.querySelector('.email-input').value;
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            
            var formData = new FormData();
            formData.append('email', email);
            
            fetch('subscribe.php', {
                method: 'POST',
                body: formData
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.success) {
                    successMsg.textContent = data.message;
                    successMsg.style.display = 'inline-block';
                    document.getElementById('notifyForm').style.display = 'none';
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Notify Me';
                }
            })
            .catch(function(error) {
                errorMsg.textContent = 'Oops! Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Notify Me';
            });
        });
    </script>
</body>
</html>
