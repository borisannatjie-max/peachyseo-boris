<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <!-- Peach gradient -->
    <linearGradient id="peachGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42"/>
      <stop offset="50%" style="stop-color:#FFB347"/>
      <stop offset="100%" style="stop-color:#FF6B6B"/>
    </linearGradient>
    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
  </defs>

  <!-- Peach body -->
  <ellipse cx="55" cy="65" rx="42" ry="45" fill="url(#peachGrad)"/>
  
  <!-- Peach highlight -->
  <ellipse cx="40" cy="50" rx="15" ry="20" fill="rgba(255,255,255,0.3)"/>

  <!-- Left leaf -->
  <path d="M55 25 Q35 15 30 30 Q40 35 55 30" fill="url(#leafGrad)"/>
  
  <!-- Right leaf -->
  <path d="M55 25 Q75 10 80 25 Q70 35 55 28" fill="url(#leafGrad)"/>

  <!-- Stem -->
  <rect x="52" y="15" width="6" height="12" rx="2" fill="#8B5A2B"/>

  <!-- Growth arrow - zigzag base -->
  <polyline points="20,85 32,75 44,80 55,60" stroke="url(#arrowGrad)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow head -->
  <polygon points="55,60 45,55 52,48" fill="#FF6B35" stroke="white" stroke-width="2"/>

  <!-- White outline for arrow -->
  <polyline points="20,85 32,75 44,80 55,60" stroke="white" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Text: PEACHY -->
  <text x="110" y="55" font-family="Arial, sans-serif" font-weight="900" font-size="42" fill="url(#textGrad)">PEACHY</text>

  <!-- Text: SEO -->
  <text x="112" y="85" font-family="Arial, sans-serif" font-weight="900" font-size="32" fill="#1a237e">SEO</text>
  
  <!-- Circular arrow replacing O in SEO - positioned over the O -->
  <g transform="translate(152, 72)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#1a237e" stroke-width="4"/>
    <polygon points="8,-8 12,2 4,0" fill="#1a237e"/>
  </g>

  <!-- Tagline -->
  <text x="113" y="105" font-family="Arial, sans-serif" font-size="11" fill="#666">Digital Growth Experts</text>
</svg>