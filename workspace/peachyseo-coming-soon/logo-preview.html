<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeachySEO Logo Preview</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: white;
        }
        h1 { margin-bottom: 40px; color: #FFB347; }
        .logo-showcase {
            display: flex;
            flex-direction: column;
            gap: 60px;
            align-items: center;
        }
        .logo-item {
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo-item-dark {
            background: #1a1a2e;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo-item-dark h3 { color: #FFB347; margin-bottom: 20px; text-align: center; }
        h3 { color: #333; margin-bottom: 20px; text-align: center; }
        img { max-width: 100%; height: auto; }
        .note { margin-top: 40px; color: #888; text-align: center; max-width: 500px; }
    </style>
</head>
<body>
    <h1>🍑 PeachySEO Logo</h1>
    
    <div class="logo-showcase">
        <div class="logo-item">
            <h3>On White Background</h3>
            <img src="peachseo-logo.svg" alt="PeachySEO Logo" width="400">
        </div>
        
        <div class="logo-item-dark">
            <h3>On Dark Background</h3>
            <img src="peachseo-logo.svg" alt="PeachySEO Logo" width="400">
        </div>
    </div>
    
    <p class="note">
        Note: This is a simplified SVG version. For production use (print, large signage, merchandise), 
        I'd recommend getting a professional designer to create vector files (AI/EPS).
    </p>
</body>
</html>
